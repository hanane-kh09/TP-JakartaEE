<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profil Utilisateur</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 60px auto; }
        img { border-radius: 50%; display: block; margin-bottom: 16px; }
        a { color: #c0392b; text-decoration: none; }
    </style>
</head>
<body>
    <h2>Profil</h2>
    <img th:if="${picture}" th:src="${picture}" width="100" alt="Photo de profil"/>
    <p>Nom : <strong th:text="${name}"></strong></p>
    <p>Email : <strong th:text="${email}"></strong></p>
    <br>
    <a href="/logout">Se déconnecter</a>
</body>
</html>
