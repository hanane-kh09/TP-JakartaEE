<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Accueil</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 80px auto; text-align: center; }
        .btn { display: inline-block; padding: 10px 24px; margin: 8px; border-radius: 4px;
               text-decoration: none; color: white; font-size: 15px; }
        .btn-google { background-color: #4285F4; }
        .btn-keycloak { background-color: #6D4AFF; }
    </style>
</head>
<body>
    <h1>Bienvenue</h1>
    <p>Connectez-vous pour accéder à votre profil.</p>
    <a class="btn btn-google" href="/oauth2/authorization/google">Se connecter avec Google</a>
    <a class="btn btn-keycloak" href="/oauth2/authorization/keycloak">Se connecter avec Keycloak</a>
</body>
</html>
