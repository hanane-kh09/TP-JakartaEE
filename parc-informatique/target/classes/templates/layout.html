<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parc Informatique - Admin Dashboard</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #eff6ff;
            --sidebar-bg: #0f172a;
            --sidebar-hover: #1e293b;
            --body-bg: #f8fafc;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            --card-shadow-hover: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--body-bg);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* Layout Structure */
        #wrapper {
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar-wrapper {
            width: 280px;
            background-color: var(--sidebar-bg);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        #page-content-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* Sidebar Styling */
        .sidebar-brand {
            padding: 24px;
            font-size: 1.25rem;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .sidebar-brand i {
            color: var(--primary-color);
        }

        .sidebar-menu {
            list-style: none;
            padding: 20px 12px;
            margin: 0;
            flex-grow: 1;
        }

        .sidebar-menu li {
            margin-bottom: 8px;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .sidebar-menu a:hover {
            color: #fff;
            background-color: var(--sidebar-hover);
        }

        .sidebar-menu li.active a {
            color: #fff;
            background-color: var(--primary-color);
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            color: #64748b;
            font-size: 0.875rem;
        }

        /* Top Navbar */
        .top-navbar {
            background-color: #fff;
            border-bottom: 1px solid var(--border-color);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .search-bar {
            position: relative;
            max-width: 320px;
            width: 100%;
        }

        .search-bar input {
            padding: 8px 16px 8px 40px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background-color: #f8fafc;
            width: 100%;
            outline: none;
            transition: all 0.2s ease;
        }

        .search-bar input:focus {
            border-color: var(--primary-color);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .search-bar i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        /* Cards and Elements */
        .main-content {
            padding: 30px;
        }

        .card-stat {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--card-shadow);
            transition: all 0.3s ease;
        }

        .card-stat:hover {
            transform: translateY(-2px);
            box-shadow: var(--card-shadow-hover);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .stat-icon-blue { background-color: #eff6ff; color: #2563eb; }
        .stat-icon-green { background-color: #f0fdf4; color: #16a34a; }
        .stat-icon-purple { background-color: #faf5ff; color: #9333ea; }
        .stat-icon-orange { background-color: #fff7ed; color: #ea580c; }

        .table-custom {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
        }

        .table-custom table {
            margin-bottom: 0;
        }

        .table-custom th {
            background-color: #f8fafc;
            border-bottom: 1px solid var(--border-color);
            padding: 16px 24px;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .table-custom td {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        .table-custom tr:last-child td {
            border-bottom: none;
        }

        .badge-pill {
            padding: 6px 12px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.8rem;
        }

        .btn-primary-custom {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 8px;
        }

        .btn-primary-custom:hover {
            background-color: var(--primary-dark);
            border-color: var(--primary-dark);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        /* Form styling */
        .form-card {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            box-shadow: var(--card-shadow);
        }

        .form-control, .form-select {
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        /* Responsive Sidebar & Spacing Styles */
        @media (max-width: 767px) {
            #sidebar-wrapper {
                margin-left: -280px;
                position: fixed;
                height: 100vh;
                z-index: 1000;
            }
            #wrapper.toggled #sidebar-wrapper {
                margin-left: 0;
            }
            #sidebar-overlay {
                display: none;
                position: fixed;
                width: 100vw;
                height: 100vh;
                background: rgba(15, 23, 42, 0.5); /* Semi-transparent slate overlay */
                backdrop-filter: blur(4px);
                z-index: 999;
                top: 0;
                left: 0;
            }
            #wrapper.toggled #sidebar-overlay {
                display: block;
            }
        }

        @media (max-width: 576px) {
            .main-content {
                padding: 16px;
            }
            .form-card {
                padding: 24px 16px;
            }
            .card-stat {
                padding: 16px;
            }
            .page-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .page-header .btn, .page-header .d-flex {
                width: 100%;
            }
            .page-header .btn {
                text-align: center;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div id="wrapper">
        <!-- Sidebar Fragment -->
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <!-- Sidebar Overlay for Mobile -->
        <div id="sidebar-overlay"></div>

        <div id="page-content-wrapper">
            <!-- Navbar Fragment -->
            <div th:replace="~{fragments/navbar :: navbar}"></div>

            <!-- Main Dynamic Content -->
            <div class="main-content">
                <!-- Alerts Block -->
                <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show mb-4 border-0 shadow-sm" role="alert" style="border-radius: 12px; background-color: #ecfdf5; color: #065f46;">
                    <i class="fa-solid fa-circle-check me-2"></i>
                    <span th:text="${successMsg}">Succès !</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show mb-4 border-0 shadow-sm" role="alert" style="border-radius: 12px; background-color: #fef2f2; color: #991b1b;">
                    <i class="fa-solid fa-circle-exclamation me-2"></i>
                    <span th:text="${errorMsg}">Erreur !</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div th:replace="${content}"></div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Mobile Menu Toggle JavaScript -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const menuToggle = document.getElementById("menu-toggle");
            const wrapper = document.getElementById("wrapper");
            const overlay = document.getElementById("sidebar-overlay");

            if (menuToggle) {
                menuToggle.addEventListener("click", function(e) {
                    e.preventDefault();
                    wrapper.classList.toggle("toggled");
                });
            }

            if (overlay) {
                overlay.addEventListener("click", function() {
                    wrapper.classList.remove("toggled");
                });
            }
        });
    </script>
</body>
</html>
