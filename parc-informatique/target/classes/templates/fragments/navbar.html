<div th:fragment="navbar" class="top-navbar">
    <div class="d-flex align-items-center gap-3">
        <!-- Optional mobile menu toggle -->
        <button class="btn btn-light d-md-none" id="menu-toggle">
            <i class="fa-solid fa-bars"></i>
        </button>
        <div class="search-bar d-none d-sm-block">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Rechercher...">
        </div>
    </div>
    <div class="d-flex align-items-center gap-4">
        <!-- Notifications -->
        <button class="btn btn-link position-relative text-secondary p-0" style="font-size: 1.25rem;">
            <i class="fa-regular fa-bell"></i>
            <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle">
                <span class="visually-hidden">New alerts</span>
            </span>
        </button>
        
        <!-- User profile -->
        <div class="d-flex align-items-center gap-3 border-start ps-4">
            <div class="text-end d-none d-sm-block">
                <div class="fw-semibold" style="font-size: 0.9rem;">Administrateur</div>
                <div class="text-secondary" style="font-size: 0.75rem;">IT Manager</div>
            </div>
            <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center fw-bold" style="width: 40px; height: 40px; font-size: 0.95rem;">
                AD
            </div>
        </div>
    </div>
</div>
